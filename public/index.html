<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Analyzer - BetterEmailV2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8e7dff;
            --primary-dark: #7c69ff;
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #a0a0b0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .form-card {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        textarea, .context-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            padding: 12px 15px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus, .context-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(142, 125, 255, 0.2);
        }

        textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.6;
            margin-bottom: 1.25rem;
        }

        .context-input {
            margin-bottom: 1.5rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-card {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
            display: none;
        }

        .results-card h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .results-content {
            line-height: 1.7;
            white-space: pre-wrap;
            color: var(--text);
            font-size: 0.95rem;
        }

        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .error-text {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <div class="logo-dot"></div>
            <h1>Email Analyzer</h1>
        </div>
        <div style="color: var(--text-dim); font-size: 0.9rem;">BetterEmailV2</div>
    </header>

    <div class="main-content">
        <div class="form-card">
            <h2>Paste your email below and provide context for AI-powered feedback.</h2>
            <form id="analyze-form">
                <label for="email-input">Email Body</label>
                <textarea id="email-input" placeholder="Paste your email here..."></textarea>

                <label for="context-input">Context / Purpose</label>
                <input type="text" id="context-input" class="context-input" placeholder='e.g. "Job application to a tech company"'>

                <button type="submit" id="analyze-btn">Analyze</button>
            </form>
        </div>

        <div class="results-card" id="results-card">
            <h2>Analysis</h2>
            <div class="results-content" id="results-content"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('analyze-form');
        const emailInput = document.getElementById('email-input');
        const contextInput = document.getElementById('context-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultsCard = document.getElementById('results-card');
        const resultsContent = document.getElementById('results-content');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const context = contextInput.value.trim();

            if (!email || !context) {
                resultsCard.style.display = 'block';
                resultsContent.innerHTML = '<span class="error-text">Please provide both an email and context.</span>';
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';
            resultsCard.style.display = 'block';
            resultsContent.innerHTML = `
                <div class="loading-indicator">
                    <div class="loading-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <span>Analyzing your email...</span>
                </div>
            `;

            try {
                const response = await fetch('/analyze-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, context })
                });

                const data = await response.json();

                if (response.ok) {
                    resultsContent.textContent = data.response;
                } else {
                    resultsContent.innerHTML = `<span class="error-text">Error: ${data.error || 'Something went wrong'}</span>`;
                }
            } catch (error) {
                resultsContent.innerHTML = '<span class="error-text">Error: Could not connect to the server.</span>';
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analyze';
            }
        });
    </script>
</body>
</html>
